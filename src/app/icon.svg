<svg
  xmlns="http://www.w3.org/2000/svg"
  width="64"
  height="64"
  viewBox="0 0 64 64"
  fill="none"
>
  <title>Mini polaroid favicon</title>
  <g transform="rotate(-6 32 32)">
    <rect
      x="17"
      y="12"
      width="30"
      height="40"
      rx="2.8"
      fill="#F9F5ED"
      stroke="#D8CCBA"
      stroke-width="1"
    />
    <rect x="20.5" y="15.5" width="23" height="24.5" rx="1.8" fill="#D6C4AE" />
    <rect
      x="20.5"
      y="15.5"
      width="23"
      height="24.5"
      rx="1.8"
      fill="url(#photoTone)"
      opacity="0.92"
    />
    <rect x="20.5" y="15.5" width="23" height="24.5" rx="1.8" fill="url(#gloss)" />
  </g>
  <defs>
    <linearGradient id="photoTone" x1="22.5" y1="17" x2="42.5" y2="38" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8D6B9" />
      <stop offset="0.56" stop-color="#BDA58C" />
      <stop offset="1" stop-color="#846A56" />
    </linearGradient>
    <linearGradient id="gloss" x1="21" y1="16" x2="42" y2="39" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.32" />
      <stop offset="0.42" stop-color="#FFFFFF" stop-opacity="0.08" />
      <stop offset="1" stop-color="#000000" stop-opacity="0.08" />
    </linearGradient>
  </defs>
</svg>
